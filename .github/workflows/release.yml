name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: |
          msbuild Deadlock_DMA.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset=v143 `
            /m `
            /nologo `
            /verbosity:minimal

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag  = "${{ github.ref_name }}"
          $name = "Release $tag"
          $msg  = "Build from tag $tag (commit ${{ github.sha }})"

          gh release create $tag "x64\Release\Deadlock_DMA.exe" `
            --title $name `
            --notes $msg `
            --latest
        shell: pwsh
